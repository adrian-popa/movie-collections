<div class="modal-backdrop" (click)="close()"></div>
<div class="modal">
  <form (ngSubmit)="create()" #form="ngForm">
    <h3 mat-dialog-title>Create New Collection</h3>
    <mat-form-field appearance="outline" style="width:100%;margin-top:1rem;">
      <mat-label>Collection name</mat-label>
      <input matInput type="text" name="name" [(ngModel)]="name" required autofocus />
    </mat-form-field>
    <div class="actions">
      <button mat-raised-button color="primary" type="submit" [disabled]="!name">Create</button>
      <button mat-button type="button" (click)="close()">Cancel</button>
    </div>
  </form>
</div>
